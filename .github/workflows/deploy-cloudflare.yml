name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }} # nosec
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }} # nosec
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Cloudflare Pages output
        run: npm run build:cf

      - name: Verify build output
        run: |
          echo "PWD: $(pwd)"
          echo "Build output:"
          ls -la cloudflare-output | sed -n '1,40p'

      - name: Deploy to Cloudflare Pages
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WPP_CONNECT_URL: ${{ secrets.WPP_CONNECT_URL }}
          # Use: https://wppconnect.portalgeolog.com.br/api/bot_cnh/send-message
          WPP_CONNECT_TOKEN: ${{ secrets.WPP_CONNECT_TOKEN }}
          # Token atual: bot_cnh:$2b$10$3eLGEjaynhqhEtMNN9QQ3eFGupBv.9ZFlPjjpICPYkI1SwN3i9iCC
          # Se token expirar, rode scripts/fix-wppconnect-vps.sh no VPS
        run: npx wrangler pages deploy cloudflare-output --project-name=portalgeolog-web --branch=main --verbose
