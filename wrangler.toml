# Cloudflare Pages configuration for Next.js
# Uses @cloudflare/next-on-pages for Edge Runtime support
name = "portalgeolog-web"
compatibility_date = "2025-03-31"
compatibility_flags = ["nodejs_compat"]

# Build configuration using next-on-pages
[build]
command = "npx @cloudflare/next-on-pages@1"
cwd = "."

# Pages build output directory (next-on-pages outputs to .vercel/output/static)
[site]
bucket = ".vercel/output/static"

# Environment variables (set these via Cloudflare dashboard or wrangler)
# wrangler pages project env add portalgeolog-web production NEXT_PUBLIC_SUPABASE_URL "your-url"
# wrangler pages project env add portalgeolog-web production NEXT_PUBLIC_SUPABASE_ANON_KEY "your-key"

# Secrets (use wrangler secret put)
# wrangler secret put SUPABASE_SERVICE_ROLE_KEY
# wrangler secret put RESEND_API_KEY
